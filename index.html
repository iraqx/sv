<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Solwed Reverb - Dark Glass Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tone.js for Audio Processing -->
    <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
    <!-- jsmediatags for extracting Audio Thumbnails -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>

    <style>
        :root {
            --accent-color: #ffffff;
            --success-color: #1ED760;
            --font-family: 'Inter', sans-serif;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.5);
            --glass-bg: rgba(0, 0, 0, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            min-height: 100%;
            overscroll-behavior-y: contain;
        }

        body {
            /* Darker Gradient Background */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 0.5rem 1rem;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .app-wrapper {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .glass-panel {
            background: var(--glass-bg);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            transition: all 0.4s ease-in-out;
        }

        /* Uploader Box */
        .file-drop-zone {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            padding: 4rem 2rem;
            opacity: 1;
            max-height: 500px;
            overflow: hidden;
        }
        .file-drop-zone:hover { background: rgba(255, 255, 255, 0.05); }
        #file-input { display: none; }
        .uploader-icon { margin-bottom: 1rem; color: var(--text-muted); }
        .uploader-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem;}
        .uploader-subtext { font-size: 0.85rem; color: var(--text-muted); }

        .is-loaded .file-drop-zone {
            max-height: 0; padding: 0; opacity: 0; margin: 0; border: none; pointer-events: none;
        }

        .controls-wrapper {
            display: none;
            flex-direction: column;
            gap: 1rem;
            opacity: 0;
            transform: translateY(15px);
            animation: slideUpFade 0.6s forwards;
        }
        .is-loaded .controls-wrapper { display: flex; }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Player Panel */
        .player-panel { padding: 1.5rem; }
        
        .track-header {
            display: flex;
            flex-direction: column; /* Stacked for bigger thumbnail */
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        /* Bigger Thumbnail */
        .thumbnail-container {
            width: 160px;
            height: 160px;
            border-radius: 16px;
            flex-shrink: 0;
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .default-art { color: rgba(255, 255, 255, 0.2); display: flex; z-index: 1; }
        .track-thumbnail {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 2;
            display: none;
        }

        .track-info {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .file-name {
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 1rem; /* Smaller title as requested */
            font-weight: 500;
            color: var(--text-main);
            flex-grow: 1;
        }

        .remove-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; color: white; padding: 0.5rem; display: flex; border-radius: 50%; transition: 0.2s;
        }
        .remove-btn:hover { background: rgba(255,50,50,0.2); }

        .progress-container { width: 100%; margin-bottom: 1.5rem; }
        .time-display { font-size: 0.75rem; color: var(--text-muted); text-align: right; margin-top: 0.5rem; font-variant-numeric: tabular-nums; }
        
        .play-pause-wrapper { display: flex; justify-content: center; }
        .play-pause-btn { background: #fff; border: none; width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #000; transition: 0.2s; }
        .play-pause-btn:hover { transform: scale(1.05); }
        .play-pause-icon { width: 24px; height: 24px; margin-left: 2px; }
        .play-pause-btn.playing .play-pause-icon { margin-left: 0; }

        /* Effects Panel */
        .effects-panel { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }
        .slider-group { width: 100%; }
        .slider-label { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.75rem; font-size: 0.85rem; font-weight: 500; color: var(--text-muted); }
        .value-display { font-size: 0.8rem; color: #fff; background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px; }

        input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.1); outline: none; border-radius: 10px; cursor: pointer; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; background: #fff; border-radius: 50%; cursor: pointer; border: 2px solid #000; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        input[type="range"]::-moz-range-thumb { width: 18px; height: 18px; background: #fff; border-radius: 50%; cursor: pointer; border: 2px solid #000; }

        /* Download Button Redesign */
        .download-btn { 
            width: 100%; 
            padding: 1.1rem; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: all 0.3s ease; 
            position: relative;
            overflow: hidden;
        }
        .download-btn:hover:not(:disabled) { background: rgba(255, 255, 255, 0.1); }
        .download-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Spinner for inside the button */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        .download-btn.processing .spinner { display: block; }
        .download-btn.done { background: var(--success-color); color: #000; border-color: var(--success-color); }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-wrapper" id="app-wrapper">
        
        <!-- Upload Card -->
        <label for="file-input" class="glass-panel file-drop-zone" id="drop-zone">
            <div class="uploader-icon">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
            </div>
            <div class="uploader-text">Select Audio</div>
            <div class="uploader-subtext">MP3, WAV, or FLAC</div>
        </label>
        <input type="file" id="file-input" accept="audio/*">

        <!-- Controls Wrapper -->
        <div class="controls-wrapper" id="controls">
            
            <!-- Player Card -->
            <div class="glass-panel player-panel">
                <div class="track-header">
                    <div class="thumbnail-container">
                        <div class="default-art">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle>
                            </svg>
                        </div>
                        <img id="track-thumbnail" class="track-thumbnail" alt="Cover Art">
                    </div>
                    <div class="track-info">
                        <span class="file-name" id="file-name"></span>
                        <button class="remove-btn" id="remove-btn" aria-label="Remove">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="progress-container">
                    <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
                    <div class="time-display" id="time-display">00:00 / 00:00</div>
                </div>
                
                <div class="play-pause-wrapper">
                    <button class="play-pause-btn" id="play-pause-btn" aria-label="Play">
                        <svg class="play-pause-icon" viewBox="0 0 32 32" fill="currentColor">
                            <path id="play-icon-path" d="M10 8 L24 16 L10 24 Z"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Effects Card -->
            <div class="glass-panel effects-panel">
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Bass Boost</span>
                        <span class="value-display" id="bass-value">0 dB</span>
                    </div>
                    <!-- Bass step changed to 0.5 -->
                    <input type="range" id="bass-slider" min="-5" max="5" step="0.5" value="0">
                </div>
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Reverb Mix</span>
                        <span class="value-display" id="reverb-value">50%</span>
                    </div>
                    <input type="range" id="reverb-slider" min="0" max="1" step="0.05" value="0.5">
                </div>
                <div class="slider-group">
                    <div class="slider-label">
                        <span>Playback Speed</span>
                        <span class="value-display" id="speed-value">1.00x</span>
                    </div>
                    <input type="range" id="speed-slider" min="0.5" max="1.5" step="0.05" value="1">
                </div>
            </div>

            <!-- Download Button -->
            <button class="glass-panel download-btn" id="download-btn">
                <div class="spinner"></div>
                <span id="btn-text">Download MP3</span>
            </button>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const appWrapper = document.getElementById('app-wrapper');
    const fileInput = document.getElementById('file-input');
    const fileNameDisplay = document.getElementById('file-name');
    const timeDisplay = document.getElementById('time-display');
    const progressBar = document.getElementById('progress-bar');
    const playPauseBtn = document.getElementById('play-pause-btn');
    const playIconPath = document.getElementById('play-icon-path');
    const reverbSlider = document.getElementById('reverb-slider');
    const reverbValueDisplay = document.getElementById('reverb-value');
    const speedSlider = document.getElementById('speed-slider');
    const speedValueDisplay = document.getElementById('speed-value');
    const bassSlider = document.getElementById('bass-slider');
    const bassValueDisplay = document.getElementById('bass-value');
    const removeBtn = document.getElementById('remove-btn');
    const downloadBtn = document.getElementById('download-btn');
    const btnText = document.getElementById('btn-text');
    const trackThumbnail = document.getElementById('track-thumbnail');
    
    const ICONS = { PLAY: 'M10 8 L24 16 L10 24 Z', PAUSE: 'M9 8 H13 V24 H9 Z M19 8 H23 V24 H19 Z' };
    let audioBuffer = null, player = null, reverb = null, eq = null, isPlaying = false;
    let startOffset = 0, playStartTime = 0, animationFrameId, originalFileName = '', currentThumbnailUrl = null;

    // --- MP3 Encoder Worker ---
    const workerCode = `
        self.importScripts('https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js');
        function floatTo16BitPCM(input) {
            const output = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                const s = Math.max(-1, Math.min(1, input[i]));
                output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return output;
        }
        self.onmessage = function(e) {
            const { audioData, config } = e.data;
            const pcmLeft = floatTo16BitPCM(audioData.left);
            const pcmRight = audioData.right ? floatTo16BitPCM(audioData.right) : pcmLeft;
            const encoder = new lamejs.Mp3Encoder(config.channels, config.sampleRate, config.bitrate);
            const mp3Data = [];
            const blockSize = 1152;
            for (let i = 0; i < pcmLeft.length; i += blockSize) {
                const leftChunk = pcmLeft.subarray(i, i + blockSize);
                const rightChunk = pcmRight.subarray(i, i + blockSize);
                const mp3buf = encoder.encodeBuffer(leftChunk, rightChunk);
                if (mp3buf.length > 0) mp3Data.push(mp3buf);
            }
            const mp3buf = encoder.flush();
            if (mp3buf.length > 0) mp3Data.push(mp3buf);
            self.postMessage(new Blob(mp3Data, { type: 'audio/mpeg' }));
        };
    `;
    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const mp3EncoderWorker = new Worker(URL.createObjectURL(blob));

    async function initAudioNodes() {
        if (player) return;
        await Tone.start();
        reverb = new Tone.Reverb({ decay: 4, preDelay: 0.01, wet: parseFloat(reverbSlider.value) }).toDestination();
        await reverb.ready;
        eq = new Tone.EQ3({ low: parseFloat(bassSlider.value), mid: 0, high: 0 }).connect(reverb);
        player = new Tone.Player().connect(eq);
        player.loop = true;
    }

    function loadThumbnail(file) {
        if (currentThumbnailUrl) URL.revokeObjectURL(currentThumbnailUrl);
        trackThumbnail.style.display = 'none';
        const jsmediatags = window.jsmediatags;
        if (!jsmediatags) return;
        jsmediatags.read(file, {
            onSuccess: (tag) => {
                const pic = tag.tags.picture;
                if (pic) {
                    const blob = new Blob([new Uint8Array(pic.data)], { type: pic.format });
                    currentThumbnailUrl = URL.createObjectURL(blob);
                    trackThumbnail.src = currentThumbnailUrl;
                    trackThumbnail.style.display = 'block';
                }
            }
        });
    }

    const formatTime = (s) => isNaN(s) ? "00:00" : `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;

    function updateProgress() {
        if (!isPlaying || !player || !audioBuffer) return;
        const elapsed = (Tone.context.now() - playStartTime) * player.playbackRate;
        let currentTime = (startOffset + elapsed) % audioBuffer.duration;
        progressBar.value = (currentTime / audioBuffer.duration) * 100;
        timeDisplay.textContent = `${formatTime(currentTime)} / ${formatTime(audioBuffer.duration)}`;
        animationFrameId = requestAnimationFrame(updateProgress);
    }

    function play() {
        if (!audioBuffer || isPlaying) return;
        player.playbackRate = parseFloat(speedSlider.value);
        player.start(Tone.now(), startOffset);
        playStartTime = Tone.context.now();
        isPlaying = true;
        playIconPath.setAttribute('d', ICONS.PAUSE);
        playPauseBtn.classList.add('playing');
        animationFrameId = requestAnimationFrame(updateProgress);
    }

    function pause() {
        if (!isPlaying) return;
        const elapsed = (Tone.context.now() - playStartTime) * player.playbackRate;
        startOffset = (startOffset + elapsed) % audioBuffer.duration;
        player.stop();
        isPlaying = false;
        playIconPath.setAttribute('d', ICONS.PLAY);
        playPauseBtn.classList.remove('playing');
        cancelAnimationFrame(animationFrameId);
    }

    async function handleFileSelect(event) {
        const file = (event.target.files || event.dataTransfer.files)[0];
        if (!file) return;
        await resetApp(false);
        originalFileName = file.name;
        fileNameDisplay.textContent = originalFileName;
        loadThumbnail(file);
        try {
            await initAudioNodes();
            const url = URL.createObjectURL(file);
            audioBuffer = await Tone.Buffer.load(url);
            player.buffer = audioBuffer;
            URL.revokeObjectURL(url);
            appWrapper.classList.add('is-loaded');
            downloadBtn.disabled = false;
            timeDisplay.textContent = `00:00 / ${formatTime(audioBuffer.duration)}`;
        } catch (e) { alert('Error decoding file.'); await resetApp(true); }
    }

    async function resetApp(revertUI = true) {
        pause(); startOffset = 0;
        if (revertUI) appWrapper.classList.remove('is-loaded');
        downloadBtn.disabled = true;
        progressBar.value = 0;
    }

    async function handleDownload() {
        if (!audioBuffer || downloadBtn.classList.contains('processing')) return;
        downloadBtn.disabled = true;
        downloadBtn.classList.add('processing');
        btnText.textContent = 'Processing...';

        try {
            const playbackRate = parseFloat(speedSlider.value);
            const renderedBuffer = await Tone.Offline(async () => {
                const offReverb = new Tone.Reverb({ decay: 4, preDelay: 0.01, wet: parseFloat(reverbSlider.value) }).toDestination();
                await offReverb.ready; 
                const offEq = new Tone.EQ3({ low: parseFloat(bassSlider.value), mid: 0, high: 0 }).connect(offReverb);
                const offPlayer = new Tone.Player(audioBuffer).connect(offEq);
                offPlayer.playbackRate = playbackRate;
                offPlayer.start(0);
            }, audioBuffer.duration / playbackRate);
            
            mp3EncoderWorker.postMessage({
                audioData: { left: renderedBuffer.getChannelData(0), right: renderedBuffer.numberOfChannels > 1 ? renderedBuffer.getChannelData(1) : null },
                config: { channels: renderedBuffer.numberOfChannels, sampleRate: renderedBuffer.sampleRate, bitrate: 192 }
            });

            mp3EncoderWorker.onmessage = (e) => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(e.data);
                a.download = `${originalFileName.split('.')[0]} (Slowed + Reverb).mp3`;
                a.click();
                
                downloadBtn.classList.remove('processing');
                downloadBtn.classList.add('done');
                btnText.textContent = 'Done!';
                setTimeout(() => {
                    downloadBtn.classList.remove('done');
                    btnText.textContent = 'Download MP3';
                    downloadBtn.disabled = false;
                }, 2000);
            };
        } catch (e) {
            btnText.textContent = 'Error';
            setTimeout(() => { downloadBtn.classList.remove('processing'); btnText.textContent = 'Download MP3'; downloadBtn.disabled = false; }, 2000);
        }
    }

    playPauseBtn.addEventListener('click', () => isPlaying ? pause() : play());
    reverbSlider.addEventListener('input', () => { 
        reverbValueDisplay.textContent = `${Math.round(reverbSlider.value * 100)}%`;
        if (reverb) reverb.wet.value = reverbSlider.value;
    });
    bassSlider.addEventListener('input', () => {
        bassValueDisplay.textContent = `${bassSlider.value > 0 ? '+' : ''}${bassSlider.value} dB`;
        if (eq) eq.low.value = bassSlider.value;
    });
    speedSlider.addEventListener('input', () => {
        speedValueDisplay.textContent = `${parseFloat(speedSlider.value).toFixed(2)}x`;
        if (player) player.playbackRate = speedSlider.value;
    });
    progressBar.addEventListener('input', () => {
        if (!audioBuffer) return;
        const wasPlaying = isPlaying;
        if (wasPlaying) pause();
        startOffset = (progressBar.value / 100) * audioBuffer.duration;
        timeDisplay.textContent = `${formatTime(startOffset)} / ${formatTime(audioBuffer.duration)}`;
        if (wasPlaying) play();
    });
    fileInput.addEventListener('change', handleFileSelect);
    removeBtn.addEventListener('click', () => resetApp(true));
    downloadBtn.addEventListener('click', handleDownload);
    
    const dropZone = document.getElementById('drop-zone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = 'rgba(255,255,255,0.05)'; });
    dropZone.addEventListener('dragleave', () => dropZone.style.background = '');
    dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.style.background = ''; handleFileSelect(e); });
});
</script>
</body>
</html>
